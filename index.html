<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center">

<h2>Tap Game Test</h2>

<button onclick="tap()">Tap</button>
<p>Score: <span id="s">0</span></p>

<script>
let s=0;
function tap(){
s++;
document.getElementById("s").innerText=s;
}
</script>

</body>
</html>

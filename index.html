<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Next Level</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0f172a, #020617);
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.logo{
font-size:20px;
font-weight:bold;
color:#00e6ff;
}

/* HERO */
.hero{
text-align:center;
padding:30px 10px;
}

.hero h1{
font-size:28px;
margin:0;
}

.hero p{
opacity:0.7;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
padding:18px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:0.3s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:scale(1.05);
border-color:#00e6ff;
box-shadow:0 0 15px rgba(0,230,255,0.3);
}

.icon{
font-size:30px;
}

/* BADGE */
.badge{
position:absolute;
top:8px;
right:8px;
background:#00e6ff;
color:black;
font-size:10px;
padding:3px 6px;
border-radius:6px;
font-weight:bold;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:0.5;
font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">🎮 Game Hub Pro</div>
<div>🔥 Play Free Games</div>
</div>

<div class="hero">
<h1>Welcome to Game Hub</h1>
<p>Tap • Quiz • Snake • Racing • Survival</p>
</div>

<div class="grid">

<div class="card" onclick="location.href='tapgame.html'">
<div class="icon">🎯</div>
<h3>Tap Game</h3>
<div class="badge">HOT</div>
</div>

<div class="card" onclick="location.href='quiz.html'">
<div class="icon">🧠</div>
<h3>Quiz Game</h3>
<div class="badge">NEW</div>
</div>

<div class="card" onclick="location.href='snakegame.html'">
<div class="icon">🐍</div>
<h3>Snake Game</h3>
</div>

<div class="card" onclick="location.href='racing.html'">
<div class="icon">🏎</div>
<h3>Racing Game</h3>
</div>

<div class="card" onclick="location.href='survival.html'">
<div class="icon">🧍</div>
<h3>Survival Game</h3>
</div>

<div class="card" onclick="location.href='tictactoe.html'">
<div class="icon">❌⭕</div>
<h3>Tic Tac Toe</h3>
<div class="badge">AI</div>
</div>

</div>

<footer>
© Game Hub • Built with Netlify 🚀
</footer>

</body>
</html>

<style>
.card{
transition:0.3s ease;
}

.card:active{
transform:scale(0.95);
}
body{
    background: radial-gradient(circle at top, #0f172a, #111827, #000);
    color:white;
    min-height:100vh;
}

/* Top Bar */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:10;
}

.logo{
    font-size:20px;
    font-weight:700;
    color:#00e6ff;
}

.search{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    outline:none;
    width:50%;
}

/* Hero */
.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:38px;
}

.hero p{
    opacity:0.7;
    margin-top:8px;
}

/* Grid */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:18px;
    max-width:1100px;
    margin:30px auto;
    padding:0 15px;
}

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    padding:22px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    text-align:center;
    transition:0.25s;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    border-color:#00e6ff;
    box-shadow:0 0 20px rgba(0,230,255,0.3);
}

.icon{
    font-size:42px;
    margin-bottom:10px;
}

.card h2{
    font-size:18px;
}

.card p{
    font-size:12px;
    opacity:0.7;
    margin-top:5px;
}

.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:#00e6ff;
    color:#000;
    font-size:10px;
    padding:4px 8px;
    border-radius:8px;
    font-weight:600;
}

footer{

}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level Game Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070b14;
color:white;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

input{
padding:10px;
border:none;
border-radius:8px;
margin:5px;
width:200px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00e6ff;
color:black;
font-weight:bold;
cursor:pointer;
}

/* HUB */
#hub{
display:none;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.logo{
color:#00e6ff;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
border:1px solid #00e6ff;
}

.badge{
position:absolute;
top:8px;
right:8px;
background:#00e6ff;
color:black;
font-size:10px;
padding:3px 6px;
border-radius:5px;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
<h2>🔐 Login Game Hub</h2>
<input id="name" placeholder="Enter Name">
<button onclick="start()">Start</button>
</div>

<!-- HUB -->
<div id="hub">

<div class="topbar">
<div>🎮 Welcome <span id="user"></span></div>
<div>💰 Coins: <span id="coins">0</span></div>
</div>

<div class="grid">

<div class="card" onclick="openGame('tapgame.html')">
🎯 Tap Game
<div class="badge">HOT</div>
</div>

<div class="card" onclick="openGame('quiz.html')">
🧠 Quiz Game
</div>

<div class="card" onclick="openGame('survival.html')">
🧍 Survival
<div class="badge">NEW</div>
</div>

<div class="card" onclick="openGame('racing.html')">
🏎 Racing
</div>

<div class="card" onclick="openGame('snakegame.html')">
🐍 Snake
</div>

<div class="card" onclick="openGame('tictactoe.html')">
❌⭕ Tic Tac Toe
</div>

<div class="card" onclick="openGame('3d.html')">
🌍 3D Game
</div>

</div>

</div>

<script>

let coins=0;
let user="";

// START LOGIN
function start(){
user=document.getElementById("name").value;

if(user==""){
alert("Enter name!");
return;
}

localStorage.setItem("user",user);

document.getElementById("login").style.display="none";
document.getElementById("hub").style.display="block";

document.getElementById("user").innerText=user;

// load coins
coins=localStorage.getItem(user+"_coins")||0;
coins=parseInt(coins);
document.getElementById("coins").innerText=coins;
}

// OPEN GAME
function openGame(file){
window.location.href=file;
}

// AUTO LOGIN
window.onload=function(){
let saved=localStorage.getItem("user");
if(saved){
user=saved;
document.getElementById("login").style.display="none";
document.getElementById("hub").style.display="block";
document.getElementById("user").innerText=user;

coins=localStorage.getItem(user+"_coins")||0;
document.getElementById("coins").innerText=coins;
}
}

</script>

</body>
</html>

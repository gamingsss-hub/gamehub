<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Pro Max</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#111827;
}

.logo{color:#00e6ff;font-weight:bold;}

select, button{
    padding:8px;
    border-radius:8px;
    border:none;
    margin:5px;
}

/* GAME AREA */
.screen{
    display:none;
    text-align:center;
    padding:10px;
}

canvas{
    background:#111827;
    border:2px solid #00e6ff;
}

/* MENU */
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:#1f2937;
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">🎮 Game Hub Pro Max</div>
    <div>💰 <span id="coin">0</span></div>
</div>

<!-- DROPDOWN -->
<div style="text-align:center">
<select onchange="switchGame(this.value)">
<option value="">Select Game</option>
<option value="racing">🏎 Racing</option>
<option value="survival">🧍 Survival</option>
</select>
</div>

<!-- MENU -->
<div id="menu" class="menu">
<div class="card" onclick="openGame('racing')">🏎 Racing Game</div>
<div class="card" onclick="openGame('survival')">🧍 Survival Game</div>
</div>

<!-- RACING -->
<div id="racing" class="screen">
<h2>🏎 Racing Game</h2>
<canvas id="race" width="300" height="400"></canvas>
<br>
<button onclick="back()">Back</button>
</div>

<!-- SURVIVAL -->
<div id="survival" class="screen">
<h2>🧍 Survival Game</h2>
<canvas id="surv" width="300" height="400"></canvas>
<br>
<button onclick="back()">Back</button>
</div>

<script>

/* COINS */
let coins=localStorage.getItem("coins")||0;
document.getElementById("coin").innerText=coins;

/* NAV */
function openGame(g){
document.getElementById("menu").style.display="none";
document.getElementById(g).style.display="block";
}
function back(){
document.querySelectorAll(".screen").forEach(e=>e.style.display="none");
document.getElementById("menu").style.display="grid";
}

/* DROPDOWN */
function switchGame(val){
if(val) openGame(val);
}

/* SOUND */
function beep(){
let s=new Audio("https://www.soundjay.com/button/beep-07.wav");
s.play();
}

/* ---------------- RACING GAME ---------------- */
let r=document.getElementById("race");
let rx=r.getContext("2d");
let carX=120;

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") carX-=10;
if(e.key=="ArrowRight") carX+=10;
beep();
});

function race(){
rx.fillStyle="#111827";
rx.fillRect(0,0,300,400);

rx.fillStyle="red";
rx.fillRect(carX,350,40,40);

requestAnimationFrame(race);
}
race();

/* ---------------- SURVIVAL GAME ---------------- */
let s=document.getElementById("surv");
let sx=s.getContext("2d");

let player={x:150,y:350};
let enemy={x:100,y:0};

document.addEventListener("touchmove",e=>{
player.x=e.touches[0].clientX-50;
});

function survival(){
sx.fillStyle="#111827";
sx.fillRect(0,0,300,400);

enemy.y+=3;
if(enemy.y>400){
enemy.y=0;
enemy.x=Math.random()*300;
coins++;
localStorage.setItem("coins",coins);
document.getElementById("coin").innerText=coins;
beep();
}

sx.fillStyle="blue";
sx.fillRect(player.x,player.y,40,40);

sx.fillStyle="red";
sx.fillRect(enemy.x,enemy.y,40,40);

requestAnimationFrame(survival);
}
survival();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poki Style Game Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.logo{
font-size:20px;
font-weight:bold;
color:#00e6ff;
}

input{
padding:8px;
border:none;
border-radius:8px;
width:50%;
outline:none;
}

/* HERO */
.hero{
text-align:center;
padding:20px;
}

.hero h1{
margin:0;
font-size:26px;
}

.hero p{
opacity:0.7;
}

/* CATEGORY */
.categories{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin:10px;
}

.categories button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
cursor:pointer;
}

.categories button:hover{
background:#00e6ff;
color:black;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
border-color:#00e6ff;
box-shadow:0 0 15px rgba(0,230,255,0.3);
}

.icon{
font-size:30px;
margin-bottom:5px;
}

.badge{
position:absolute;
top:8px;
right:8px;
background:#00e6ff;
color:black;
font-size:10px;
padding:3px 6px;
border-radius:5px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:0.5;
font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">🎮 Game Hub</div>
<input placeholder="Search games..." onkeyup="searchGame(this.value)">
</div>

<div class="hero">
<h1>🔥 Play Free Online Games</h1>
<p>Racing • Survival • Action • Fun</p>
</div>

<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('action')">Action</button>
<button onclick="filter('survival')">Survival</button>
<button onclick="filter('racing')">Racing</button>
</div>

<div class="grid">

<div class="card action" onclick="openGame('tapgame.html')">
<div class="icon">🎯</div>
Tap Game
<div class="badge">HOT</div>
</div>

<div class="card action" onclick="openGame('quiz.html')">
<div class="icon">🧠</div>
Quiz Game
</div>

<div class="card survival" onclick="openGame('survival.html')">
<div class="icon">🧍</div>
Survival Game
<div class="badge">NEW</div>
</div>

<div class="card racing" onclick="openGame('racing.html')">
<div class="icon">🏎</div>
Racing Game
</div>

<div class="card" onclick="openGame('snakegame.html')">
<div class="icon">🐍</div>
Snake Game
</div>

<div class="card" onclick="openGame('tictactoe.html')">
<div class="icon">❌⭕</div>
Tic Tac Toe
</div>

</div>

<footer>
© Game Hub • Inspired by Poki 🚀
</footer>

<script>

// OPEN GAME
function openGame(file){
window.location.href=file;
}

// FILTER
function filter(type){
let cards=document.querySelectorAll(".card");
cards.forEach(c=>{
if(type=="all"){
c.style.display="block";
}else{
c.style.display=c.classList.contains(type)?"block":"none";
}
});
}

// SEARCH
function searchGame(val){
let cards=document.querySelectorAll(".card");
cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val.toLowerCase())?"block":"none";
});
}

</script>

</body>
</html>

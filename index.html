<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Max Game Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070b14;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.logo{
color:#00e6ff;
font-weight:bold;
}

.wallet{
font-size:14px;
}

/* HERO */
.hero{
text-align:center;
padding:20px;
}

/* BUTTONS */
.btns{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:10px;
}

.btns button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
cursor:pointer;
}

.btns button:hover{
background:#00e6ff;
color:black;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
border-color:#00e6ff;
}

.icon{
font-size:28px;
}

.badge{
position:absolute;
top:5px;
right:5px;
background:#00e6ff;
color:black;
font-size:10px;
padding:3px 6px;
border-radius:5px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:0.5;
font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">🎮 PRO MAX HUB</div>
<div class="wallet">💰 Coins: <span id="coins">0</span></div>
</div>

<div class="hero">
<h1>🔥 Play & Earn Hub</h1>
<p>Survival • Racing • Puzzle • Fun Games</p>
</div>

<div class="btns">
<button onclick="daily()">🎁 Daily Reward</button>
<button onclick="resetCoins()">Reset</button>
</div>

<div class="grid">

<div class="card" onclick="openGame('tapgame.html')">
<div class="icon">🎯</div>
Tap Game
<div class="badge">HOT</div>
</div>

<div class="card" onclick="openGame('quiz.html')">
<div class="icon">🧠</div>
Quiz Game
</div>

<div class="card" onclick="openGame('survival.html')">
<div class="icon">🧍</div>
Survival
<div class="badge">NEW</div>
</div>

<div class="card" onclick="openGame('racing.html')">
<div class="icon">🏎</div>
Racing
</div>

<div class="card" onclick="openGame('snakegame.html')">
<div class="icon">🐍</div>
Snake
</div>

<div class="card" onclick="openGame('tictactoe.html')">
<div class="icon">❌⭕</div>
Tic Tac Toe
</div>

</div>

<footer>
© Pro Max Game Hub 🚀
</footer>

<script>

// OPEN GAME
function openGame(file){
window.location.href=file;
}

// COINS SYSTEM
let coins=localStorage.getItem("coins")||0;
coins=parseInt(coins);
document.getElementById("coins").innerText=coins;

// DAILY REWARD
function daily(){
coins+=20;
localStorage.setItem("coins",coins);
document.getElementById("coins").innerText=coins;
alert("🎁 +20 Coins Added!");
}

// RESET
function resetCoins(){
coins=0;
localStorage.setItem("coins",coins);
document.getElementById("coins").innerText=coins;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Swipe Game Ultra</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;

/* ⭐ FIX SCREEN MOVE */
touch-action:none;
overscroll-behavior:none;
}

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle,#00e6ff22 1px,transparent 1px);
background-size:40px 40px;
animation:bgMove 20s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{
transform:translate(0,0);
}
100%{
transform:translate(-200px,-200px);
}
}

h1{
margin:10px;
color:#00e6ff;
text-shadow:0 0 15px #00e6ff;
}

canvas{
background:#111827;
border:3px solid #00e6ff;
box-shadow:0 0 25px #00e6ff;
border-radius:10px;
}

.score{
margin:10px;
font-size:22px;
font-weight:bold;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
background:#00e6ff;
color:black;
font-weight:bold;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:active{
transform:scale(0.95);
}

/* MOBILE CONTROLS */

.controls{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.row{
display:flex;
gap:8px;
}

.ctrl-btn{
width:75px;
height:75px;
font-size:28px;
border:none;
border-radius:15px;
background:#111827;
color:white;
border:2px solid #00e6ff;
box-shadow:0 0 15px #00e6ff;
cursor:pointer;
}

.ctrl-btn:active{
transform:scale(0.90);
}

/* GAME OVER */

#gameOver{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#gameOver h2{
font-size:45px;
color:red;
margin-bottom:10px;
text-shadow:0 0 20px red;
}

#gameOver p{
font-size:22px;
}

</style>
</head>

<body>

<h1>🐍 Snake Swipe Game Ultra</h1>

<div class="score">
🏆 Score:
<span id="score">0</span>
</div>

<canvas id="game" width="300" height="300"></canvas>

<button onclick="restart()">
🔄 Restart
</button>

<!-- CONTROLS -->

<div class="controls">

<button class="ctrl-btn"
onclick="setDirection('UP')">
⬆️
</button>

<div class="row">

<button class="ctrl-btn"
onclick="setDirection('LEFT')">
⬅️
</button>

<button class="ctrl-btn"
onclick="setDirection('DOWN')">
⬇️
</button>

<button class="ctrl-btn"
onclick="setDirection('RIGHT')">
➡️
</button>

</div>

</div>

<!-- GAME OVER -->

<div id="gameOver">
<h2>💀 GAME OVER</h2>
<p>Restarting...</p>
</div>

<!-- SOUNDS -->

<audio id="eatSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<audio id="gameOverSound">
<source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3">
</audio>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

let box = 15;

let snake,
direction,
food,
score,
game,
speed;

/* START GAME */

function init(){

snake = [
{x:150,y:150}
];

direction = "RIGHT";

food = randomFood();

score = 0;

speed = 120;

document
.getElementById("score")
.innerText = score;

document
.getElementById("gameOver")
.style.display = "none";

clearInterval(game);

game = setInterval(draw,speed);

}

/* RANDOM FOOD */

function randomFood(){

return{

x:
Math.floor(Math.random()*20)*box,

y:
Math.floor(Math.random()*20)*box

};

}

/* KEYBOARD */

document.addEventListener(
"keydown",
e=>{

if(
(e.key==="ArrowUp" || e.key==="w")
&& direction!="DOWN"
){
direction="UP";
}

if(
(e.key==="ArrowDown" || e.key==="s")
&& direction!="UP"
){
direction="DOWN";
}

if(
(e.key==="ArrowLeft" || e.key==="a")
&& direction!="RIGHT"
){
direction="LEFT";
}

if(
(e.key==="ArrowRight" || e.key==="d")
&& direction!="LEFT"
){
direction="RIGHT";
}

});

/* BUTTON CONTROL */

function setDirection(dir){

if(dir==="UP" && direction!="DOWN"){
direction="UP";
}

if(dir==="DOWN" && direction!="UP"){
direction="DOWN";
}

if(dir==="LEFT" && direction!="RIGHT"){
direction="LEFT";
}

if(dir==="RIGHT" && direction!="LEFT"){
direction="RIGHT";
}

}

/* SWIPE CONTROL */

let startX,startY;

document.addEventListener(
"touchstart",
e=>{

startX =
e.touches[0].clientX;

startY =
e.touches[0].clientY;

},
{passive:false}
);

document.addEventListener(
"touchmove",
e=>{
e.preventDefault();
},
{passive:false}
);

document.addEventListener(
"touchend",
e=>{

let endX =
e.changedTouches[0].clientX;

let endY =
e.changedTouches[0].clientY;

let dx = endX-startX;
let dy = endY-startY;

if(
Math.abs(dx)>
Math.abs(dy)
){

if(dx>0 && direction!="LEFT"){
direction="RIGHT";
}

else if(dx<0 && direction!="RIGHT"){
direction="LEFT";
}

}else{

if(dy>0 && direction!="UP"){
direction="DOWN";
}

else if(dy<0 && direction!="DOWN"){
direction="UP";
}

}

},
{passive:false}
);

/* DRAW */

function draw(){

ctx.fillStyle="#111827";

ctx.fillRect(
0,
0,
300,
300
);

/* SNAKE */

for(
let i=0;
i<snake.length;
i++
){

ctx.fillStyle =
i==0
?
"#00e6ff"
:
"#22c55e";

ctx.fillRect(
snake[i].x,
snake[i].y,
box,
box
);

}

/* FOOD */

ctx.fillStyle="red";

ctx.fillRect(
food.x,
food.y,
box,
box
);

let head = {
...snake[0]
};

/* MOVE */

if(direction=="UP")
head.y -= box;

if(direction=="DOWN")
head.y += box;

if(direction=="LEFT")
head.x -= box;

if(direction=="RIGHT")
head.x += box;

/* GAME OVER */

if(
head.x<0 ||
head.x>=300 ||
head.y<0 ||
head.y>=300 ||
collision(head)
){

clearInterval(game);

document
.getElementById("gameOver")
.style.display="flex";

document
.getElementById("gameOverSound")
.play();

setTimeout(()=>{
restart();
},2500);

return;

}

/* NEW HEAD */

snake.unshift(head);

/* FOOD EAT */

if(
head.x==food.x &&
head.y==food.y
){

document
.getElementById("eatSound")
.play();

score++;

document
.getElementById("score")
.innerText = score;

food = randomFood();

/* ⭐ HARD MODE */

if(speed>60){

speed -= 5;

clearInterval(game);

game = setInterval(draw,speed);

}

}else{

snake.pop();

}

}

/* COLLISION */

function collision(head){

for(
let i=1;
i<snake.length;
i++
){

if(
head.x==snake[i].x &&
head.y==snake[i].y
){
return true;
}

}

return false;

}

/* RESTART */

function restart(){
init();
}

/* START */

init();

</script>

</body>
</html>

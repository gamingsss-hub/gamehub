<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Game</title>

<style>
body{
margin:0;
background:#0b1220;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#111827;
display:block;
margin:10px auto;
border:2px solid #00e6ff;
}
</style>
</head>

<body>

<h2>🧍 Survival Game</h2>

<canvas id="game" width="300" height="450"></canvas>

<br>
<button onclick="restart()">Restart</button>
<button onclick="back()">Back</button>

<script>

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

// PLAYER
let player={x:130,y:380};

// ENEMY
let enemy={x:100,y:0};

// START GAME FLAG
let running=true;

// CONTROLS
document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") player.x-=15;
if(e.key=="ArrowRight") player.x+=15;
});

// LOOP (IMPORTANT)
function loop(){

if(!running) return;

ctx.clearRect(0,0,300,450);

// PLAYER
ctx.fillStyle="blue";
ctx.fillRect(player.x,player.y,40,40);

// ENEMY
enemy.y+=4;
ctx.fillStyle="red";
ctx.fillRect(enemy.x,enemy.y,40,40);

// RESET ENEMY
if(enemy.y>450){
enemy.y=0;
enemy.x=Math.random()*260;
}

// COLLISION
if(
player.x < enemy.x+40 &&
player.x+40 > enemy.x &&
player.y < enemy.y+40 &&
player.y+40 > enemy.y
){
running=false;
ctx.fillStyle="red";
ctx.font="20px Arial";
ctx.fillText("GAME OVER",90,220);
return;
}

requestAnimationFrame(loop);
}

// RESTART
function restart(){
location.reload();
}

// BACK
function back(){
window.location.href="index.html";
}

// START GAME (VERY IMPORTANT)
loop();

</script>

</body>
</html>

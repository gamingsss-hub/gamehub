<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Game</title>

<style>
body{
margin:0;
background:#0b1220;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#111827;
display:block;
margin:10px auto;
border:3px solid #00e6ff;
border-radius:12px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#00e6ff;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🧍 Survival Game</h2>

<canvas id="game" width="300" height="450"></canvas>

<br>
<button onclick="restart()">Restart</button>
<button onclick="back()">Back</button>

<script>

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

// PLAYER
let player={
x:130,
y:380,
w:40,
h:40
};

// ENEMY
let enemy={
x:100,
y:0,
w:40,
h:40,
speed:3
};

let score=0;
let gameOver=false;

// CONTROL (keyboard)
document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") player.x-=15;
if(e.key=="ArrowRight") player.x+=15;
});

// TOUCH CONTROL
document.addEventListener("touchmove",e=>{
player.x=e.touches[0].clientX-50;
});

// COLLISION
function hit(a,b){
return a.x < b.x+b.w &&
a.x+a.w > b.x &&
a.y < b.y+b.h &&
a.y+a.h > b.y;
}

// GAME LOOP
function update(){

ctx.clearRect(0,0,300,450);

// PLAYER
ctx.fillStyle="blue";
ctx.fillRect(player.x,player.y,player.w,player.h);

// ENEMY MOVE
enemy.y+=enemy.speed;

// ENEMY DRAW
ctx.fillStyle="red";
ctx.fillRect(enemy.x,enemy.y,enemy.w,enemy.h);

// RESET ENEMY
if(enemy.y>450){
enemy.y=0;
enemy.x=Math.random()*260;
score++;
enemy.speed+=0.2;
}

// SCORE
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("Score: "+score,10,20);

// COLLISION CHECK
if(hit(player,enemy)){
gameOver=true;
ctx.fillStyle="red";
ctx.font="30px Arial";
ctx.fillText("GAME OVER",60,220);
return;
}

requestAnimationFrame(update);
}

// RESTART
function restart(){
player.x=130;
enemy.y=0;
enemy.speed=3;
score=0;
gameOver=false;
update();
}

// BACK
function back(){
window.location.href="index.html";
}

update();

</script>

</body>
</html>

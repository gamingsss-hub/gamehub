<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Master Pro</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
text-align:center;
width:350px;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
margin-bottom:10px;
}

.score{
font-size:50px;
color:#4ade80;
font-weight:bold;
}

.timer{
font-size:22px;
margin:10px 0;
color:#fbbf24;
}

.high{
margin:10px 0;
font-size:18px;
}

button{
padding:14px 25px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
margin:8px;
background:#2563eb;
color:white;
}

button:hover{
transform:scale(1.05);
}

#tapBtn{
display:none;
}

#msg{
font-size:22px;
color:#f87171;
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h1>🔥 Tap Master Pro 🔥</h1>
<a href="quiz.html">🧠 Quiz Game</a>

<div class="timer">
⏳ Time: <span id="time">30</span>s
</div>

<div class="score" id="score">0</div>

<div class="high">
🏆 High Score: <span id="highscore">0</span>
</div>

<button id="startBtn" onclick="startGame()">
Start Game
</button>

<button id="tapBtn" onclick="tap()">
TAP FAST!
</button>

<div id="msg"></div>

</div>

<script>

let score=0;
let time=30;
let timer;

let highScore=
localStorage.getItem("highscore") || 0;

document.getElementById("highscore").innerText=highScore;

function startGame(){

score=0;
time=30;

document.getElementById("score").innerText=score;
document.getElementById("time").innerText=time;
document.getElementById("msg").innerText="";

document.getElementById("startBtn").style.display="none";
document.getElementById("tapBtn").style.display="inline-block";

timer=setInterval(()=>{

time--;
document.getElementById("time").innerText=time;

if(time<=0){

clearInterval(timer);

document.getElementById("tapBtn").style.display="none";
document.getElementById("startBtn").style.display="inline-block";

if(score>highScore){

highScore=score;

localStorage.setItem(
"highscore",
highScore
);

document.getElementById("highscore").innerText=
highScore;
}

document.getElementById("msg").innerHTML=
"🎉 Game Over!<br>Score: "+score;

}

},1000);

}

function tap(){

score++;

document.getElementById("score").innerText=
score;

}

</script>

</body>
</html>

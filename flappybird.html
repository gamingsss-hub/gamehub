<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🐤 Flappy Bird Ultra</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
-webkit-tap-highlight-color:transparent;
}

body{
background:#0f172a;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
touch-action:none;
}

/* GAME CONTAINER */

.game-container{
position:relative;
width:100%;
max-width:520px;
}

/* SCORE */

#score{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
font-size:38px;
font-weight:bold;
color:#00e6ff;
text-shadow:0 0 15px #00e6ff;
z-index:5;
}

/* BEST SCORE */

#best{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
font-size:18px;
color:white;
z-index:5;
}

/* CANVAS */

canvas{
width:100%;
height:85vh;
display:block;
background:
linear-gradient(
to bottom,
#38bdf8,
#0f172a
);

border:4px solid #00e6ff;
border-radius:20px;
box-shadow:0 0 30px #00e6ff;
}

/* GAME OVER */

#gameOver{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:42px;
font-weight:bold;
color:red;
display:none;
z-index:10;
text-shadow:0 0 20px red;
}

/* BUTTON */

#restartBtn{
position:absolute;
top:55%;
left:50%;
transform:translateX(-50%);
padding:14px 25px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
background:#00e6ff;
cursor:pointer;
display:none;
z-index:10;
box-shadow:0 0 20px #00e6ff;
}

/* GUIDE */

.guide{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:14px;
background:rgba(0,0,0,0.5);
padding:8px 15px;
border-radius:20px;
color:white;
z-index:5;
}

</style>
</head>

<body>

<div class="game-container">

<div id="score">0</div>

<div id="best">
🏆 Best:
<span id="bestScore">0</span>
</div>

<div id="gameOver">
💀 GAME OVER
</div>

<button id="restartBtn"
onclick="restartGame()">
🔄 Restart
</button>

<canvas id="game"
width="520"
height="800"></canvas>

<div class="guide">
PC: SPACE / CLICK / ↑
<br>
Mobile: TAP SCREEN
</div>

</div>

<!-- SOUNDS -->

<audio id="jumpSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<audio id="pointSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3">
</audio>

<audio id="deadSound">
<source src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3">
</audio>

<script>

/* CANVAS */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

/* SOUNDS */

const jumpSound =
document.getElementById("jumpSound");

const pointSound =
document.getElementById("pointSound");

const deadSound =
document.getElementById("deadSound");

/* SCORE */

let score = 0;

let best =
localStorage.getItem("flappyBest") || 0;

document
.getElementById("bestScore")
.innerText = best;

/* GAME */

let gameOver = false;

/* BIRD */

const bird = {

x:120,
y:300,

radius:20,

velocity:0,

gravity:0.45,

jump:-8

};

/* PIPES */

let pipes = [];

let pipeWidth = 80;

let pipeGap = 180;

let speed = 3;

/* CREATE PIPE */

function createPipe(){

let topHeight =
Math.random()*300 + 50;

pipes.push({

x:canvas.width,

top:topHeight,

bottom:
canvas.height -
topHeight -
pipeGap,

passed:false

});

}

/* START PIPE */

createPipe();

/* DRAW BIRD */

function drawBird(){

ctx.beginPath();

ctx.fillStyle="#ffeb3b";

ctx.arc(
bird.x,
bird.y,
bird.radius,
0,
Math.PI*2
);

ctx.fill();

/* EYE */

ctx.fillStyle="black";

ctx.beginPath();

ctx.arc(
bird.x+6,
bird.y-5,
3,
0,
Math.PI*2
);

ctx.fill();

}

/* DRAW PIPES */

function drawPipes(){

ctx.fillStyle="#22c55e";

pipes.forEach(pipe=>{

/* TOP */

ctx.fillRect(
pipe.x,
0,
pipeWidth,
pipe.top
);

/* BOTTOM */

ctx.fillRect(
pipe.x,
canvas.height-pipe.bottom,
pipeWidth,
pipe.bottom
);

});

}

/* JUMP */

function jump(){

if(gameOver) return;

bird.velocity = bird.jump;

jumpSound.currentTime = 0;

jumpSound.play();

}

/* CONTROLS */

/* KEYBOARD */

document.addEventListener(
"keydown",
e=>{

if(
e.code==="Space" ||
e.key==="ArrowUp"
){

e.preventDefault();

jump();

}

});

/* MOUSE */

canvas.addEventListener(
"mousedown",
jump
);

/* TOUCH */

canvas.addEventListener(
"touchstart",
e=>{

e.preventDefault();

jump();

},
{passive:false}
);

/* GAME LOOP */

function update(){

if(gameOver) return;

/* CLEAR */

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

/* BACKGROUND */

ctx.fillStyle="#38bdf8";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

/* BIRD */

bird.velocity += bird.gravity;

bird.y += bird.velocity;

/* DRAW */

drawBird();

drawPipes();

/* PIPE LOGIC */

pipes.forEach(pipe=>{

pipe.x -= speed;

/* SCORE */

if(
!pipe.passed &&
pipe.x + pipeWidth < bird.x
){

pipe.passed = true;

score++;

document
.getElementById("score")
.innerText = score;

pointSound.currentTime = 0;

pointSound.play();

/* HARD MODE */

if(score % 5 === 0){

speed += 0.3;

}

}

/* COLLISION */

if(

bird.x + bird.radius > pipe.x &&
bird.x - bird.radius <
pipe.x + pipeWidth &&

(

bird.y - bird.radius <
pipe.top ||

bird.y + bird.radius >
canvas.height - pipe.bottom

)

){

endGame();

}

});

/* REMOVE OLD PIPE */

if(
pipes.length &&
pipes[0].x < -100
){

pipes.shift();

}

/* NEW PIPE */

if(
pipes[pipes.length-1].x < 260
){

createPipe();

}

/* TOP/BOTTOM HIT */

if(
bird.y + bird.radius > canvas.height ||
bird.y - bird.radius < 0
){

endGame();

}

/* LOOP */

requestAnimationFrame(update);

}

/* END GAME */

function endGame(){

if(gameOver) return;

gameOver = true;

deadSound.play();

/* SHOW */

document
.getElementById("gameOver")
.style.display="block";

document
.getElementById("restartBtn")
.style.display="block";

/* BEST */

if(score > best){

best = score;

localStorage.setItem(
"flappyBest",
best
);

document
.getElementById("bestScore")
.innerText = best;

}

}

/* RESTART */

function restartGame(){

score = 0;

speed = 3;

gameOver = false;

bird.y = 300;

bird.velocity = 0;

pipes = [];

createPipe();

document
.getElementById("score")
.innerText = 0;

document
.getElementById("gameOver")
.style.display="none";

document
.getElementById("restartBtn")
.style.display="none";

update();

}

/* START */

update();

</script>

</body>
</html>

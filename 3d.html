<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Racing</title>
<style>
body{margin:0;overflow:hidden;background:black}
#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
font-family:Arial;
z-index:10;
}
#controls{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
box-sizing:border-box;
z-index:10;
}
.btn{
width:80px;
height:80px;
font-size:30px;
border:none;
border-radius:50%;
opacity:0.8;
}
</style>
</head>
<body>

<div id="score">Score: 0</div>

<div id="controls">
<button class="btn" id="left">⬅️</button>
<button class="btn" id="right">➡️</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Road
const roadGeo = new THREE.PlaneGeometry(8,50);
const roadMat = new THREE.MeshBasicMaterial({color:0x333333});
const road = new THREE.Mesh(roadGeo,roadMat);
road.rotation.x = -Math.PI/2;
scene.add(road);

// Player Car
const carGeo = new THREE.BoxGeometry(1,0.5,2);
const carMat = new THREE.MeshBasicMaterial({color:0x00e6ff});
const car = new THREE.Mesh(carGeo,carMat);
car.position.y = 0.3;
car.position.z = 8;
scene.add(car);

// Obstacle
const obsGeo = new THREE.BoxGeometry(1,0.5,2);
const obsMat = new THREE.MeshBasicMaterial({color:0xff0000});

let obstacles=[];

function createObstacle(){
let o = new THREE.Mesh(obsGeo,obsMat);

o.position.x = (Math.random()*4)-2;
o.position.y = 0.3;
o.position.z = -30;

scene.add(o);
obstacles.push(o);
}

setInterval(createObstacle,1200);

camera.position.y = 6;
camera.position.z = 12;
camera.lookAt(car.position);

let score=0;

function crash(a,b){
return (
Math.abs(a.position.x-b.position.x)<1 &&
Math.abs(a.position.z-b.position.z)<2
);
}

// PC Controls
document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") car.position.x-=0.5;
if(e.key==="ArrowRight") car.position.x+=0.5;
});

// Mobile Controls
document.getElementById("left").ontouchstart=()=>{
car.position.x-=0.5;
};

document.getElementById("right").ontouchstart=()=>{
car.position.x+=0.5;
};

function animate(){
requestAnimationFrame(animate);

obstacles.forEach(o=>{

o.position.z += 0.35;

if(o.position.z>12){
o.position.z=-30;
o.position.x=(Math.random()*4)-2;

score++;
document.getElementById("score").innerText=
"Score: "+score;
}

if(crash(car,o)){
alert("Game Over! Score: "+score);
location.reload();
}
});

renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
